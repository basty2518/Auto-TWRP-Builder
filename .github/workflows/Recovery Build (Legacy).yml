name: Recovery Build (Legacy)

on:
  workflow_dispatch:
    inputs:
      IMG_URL:
        description: 'IMG_ URL'
        required: true
        default: 'https://github.com/KoCleo/Auto-Twrp-Builder/raw/master/recovery.img'
      MANIFEST_URL:
        description: 'MANIFEST_URL'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni'
      MANIFEST_BRANCH:
        description: 'MANIFEST_BRANCH'
        required: true
        default: 'twrp-8.1'
      BUILD_TARGET:
        description: 'BUILD_TARGET'
        required: true
        default: 'recovery'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Check Out
      uses: actions/checkout@v3

    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    - name: Prepare environment
      run: |
        sudo apt update
        sudo apt -y install python3 python3-pip cpio wget unzip
        pip3 install twrpdtgen

    - name: Download osm0sis AIK
      run: |
        wget https://github.com/osm0sis/Android-Image-Kitchen/archive/refs/heads/master.zip -O aik.zip
        unzip aik.zip
        mv Android-Image-Kitchen-master AIK
        chmod +x AIK/*

    - name: Download recovery image
      run: |
        wget "${{ github.event.inputs.IMG_URL }}" -O recovery.img

    - name: Unpack recovery with osm0sis AIK
      run: |
        cd AIK
        ./unpackimg.sh ../recovery.img
        cd ..

    - name: Generate Device Tree (patched)
      run: |
        python3 - << 'EOF'
from twrpdtgen.device_tree import DeviceTree
from pathlib import Path
import os

# Instead of unpacking the image, use the AIK output folder
dt = DeviceTree(Path("AIK/split_img"))
dt.dump_to_folder(Path("device"))
EOF

    - name: Install OpenJDK
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '8'

    - name: Install repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize repo
      run: |
        mkdir workspace
        cd workspace
        repo init --depth=1 -u ${{ github.event.inputs.MANIFEST_URL }} -b ${{ github.event.inputs.MANIFEST_BRANCH }}

    - name: Repo Sync
      run: |
        repo sync -j$(nproc --all) --force-sync
      working-directory: workspace

    - name: Copy Device Tree
      run: |
        cp -r device workspace/device

    - name: Build recovery
      run: |
        cd workspace
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch omni_device-eng
        make ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          workspace/out/target/product/*/*.img
          workspace/out/target/product/*/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
